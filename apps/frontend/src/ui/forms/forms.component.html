@if (formsStore.fetchFormsStatus().isLoading) {
  <div
    class="forms-loading"
    role="status"
    aria-live="polite"
    data-testid="forms-loading"
  >
    <mat-spinner diameter="48"></mat-spinner>
    <p>{{ 'common.loading' | translate }}</p>
  </div>
} @else {
<mat-tab-group [(selectedIndex)]="selectedTabIndex" data-testid="forms-tab-group">
  <mat-tab data-testid="forms-checkout-tab">
    <ng-template mat-tab-label>
      <span class="tab-label">{{ 'forms.check-out' | translate }}</span>
    </ng-template>
    
    <app-forms-tab-content
      data-testid="forms-checkout-content"
      [forms]="formsStore.checkOutForms()" 
      emptyStateMessage="forms.empty-check-out"
      [statusFilter]="checkOutQueryParams()?.searchStatus || 'pending'"
      [searchTerm]="checkOutQueryParams()?.searchTerm || ''">
    </app-forms-tab-content>
  </mat-tab>

  <mat-tab data-testid="forms-checkin-tab">
    <ng-template mat-tab-label>
      <span class="tab-label">{{ 'forms.check-in' | translate }}</span>
    </ng-template>
    
    <app-forms-tab-content
      data-testid="forms-checkin-content"
      [forms]="formsStore.checkInForms()" 
      emptyStateMessage="forms.empty-check-in"
      [statusFilter]="checkInQueryParams()?.searchStatus || 'pending'"
      [searchTerm]="checkInQueryParams()?.searchTerm || ''">
    </app-forms-tab-content>
  </mat-tab>
</mat-tab-group>
}
