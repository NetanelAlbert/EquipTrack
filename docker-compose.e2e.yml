services:
  localstack:
    image: public.ecr.aws/localstack/localstack:3.8
    container_name: equiptrack-localstack
    ports:
      - '4566:4566'
    environment:
      - SERVICES=dynamodb,s3,secretsmanager
      - AWS_DEFAULT_REGION=us-east-1
      - DEBUG=0
      - PERSISTENCE=1
    volumes:
      - localstack-data:/var/lib/localstack
      # Do not mount docker.sock: LocalStack can use the host daemon and pull extra
      # images (often from Docker Hub), hitting anonymous rate limits in CI.
      # SERVICES are dynamodb,s3,secretsmanager only — no container-backed emulators.
    healthcheck:
      test: ['CMD', 'bash', '-c', 'curl -fsS http://localhost:4566/_localstack/health > /dev/null']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  localstack-data:
