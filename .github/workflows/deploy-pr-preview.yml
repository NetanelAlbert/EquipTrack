# Isolated full-stack preview per PR: STAGE=pr-<number>, unique hostname under BASE_DOMAIN.
#
# Secrets (GitHub → Settings → Environments → development → Environment secrets recommended):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, API_GATEWAY_REGIONAL_CERTIFICATE_ARN,
#   PR_PREVIEW_SEED_PASSWORD (shared password for seeded preview users — not in git).
#
# IMPORTANT: Put PR_PREVIEW_SEED_PASSWORD on the same "development" environment as the other
# deploy secrets. Job-level `if: secrets.*` does NOT see environment-only secrets, which
# caused skipped/failed runs before the two-job pattern below.
#
# Manual validation: Actions → "Deploy PR preview" → Run workflow (PR number + optional ref).
#
# Optional: NX_CLOUD_ACCESS_TOKEN (repository or environment)
name: Deploy PR preview

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull request number (preview stage will be pr-<number>)'
        required: true
        type: string
      ref:
        description: 'Git ref to build and deploy (branch, tag, or SHA)'
        required: false
        default: 'develop'

concurrency:
  group: pr-preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

env:
  AWS_REGION: il-central-1
  NODE_VERSION: '20'
  NX_NO_CLOUD: 'true'
  NX_BRANCH: ${{ github.event.repository.default_branch || 'develop' }}
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  BASE_DOMAIN: equip-track.com
  RUNTIME_FEATURE_PREVIEW_LOGIN: 'true'
  E2E_AUTH_ENABLED: 'false'

jobs:
  # Resolve environment secrets (incl. PR_PREVIEW_SEED_PASSWORD) before gating deploy.
  check-preview-secrets:
    name: Check preview prerequisites
    runs-on: ubuntu-latest
    environment: development
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
    outputs:
      has_seed_password: ${{ steps.gate.outputs.has_seed_password }}
      stage: ${{ steps.stage.outputs.stage }}

    steps:
      - name: Determine stage name
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            N="${{ github.event.inputs.pr_number }}"
          else
            N="${{ github.event.pull_request.number }}"
          fi
          echo "stage=pr-${N}" >> "$GITHUB_OUTPUT"

      - name: Check PR_PREVIEW_SEED_PASSWORD is available
        id: gate
        env:
          PR_PREVIEW_SEED_PASSWORD: ${{ secrets.PR_PREVIEW_SEED_PASSWORD }}
        run: |
          if [ -n "${PR_PREVIEW_SEED_PASSWORD}" ]; then
            echo "has_seed_password=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_seed_password=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR_PREVIEW_SEED_PASSWORD is empty. Add it under Settings → Environments → **development** → Environment secrets (same place as AWS keys). Repository-only secrets are also supported if you remove \`environment: development\` from jobs."
          fi

  deploy-preview:
    name: Deploy PR preview stack
    runs-on: ubuntu-latest
    needs: check-preview-secrets
    if: needs.check-preview-secrets.outputs.has_seed_password == 'true'
    environment: development

    env:
      STAGE: ${{ needs.check-preview-secrets.outputs.stage }}
      PR_PREVIEW_SEED_PASSWORD: ${{ secrets.PR_PREVIEW_SEED_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare deployment
        run: |
          node scripts/deployment-status-tracker.js track prepare started
          node scripts/prepare-deployment.js
          node scripts/deployment-status-tracker.js track prepare success

      - name: Hydrate backend infra from AWS
        run: node scripts/hydrate-backend-infra.js

      - name: Build backend
        run: npx nx build backend --configuration=development

      - name: Create DynamoDB tables
        run: |
          node scripts/deployment-status-tracker.js track dynamodb started
          node scripts/create-dynamodb-tables.js
          node scripts/deployment-status-tracker.js track dynamodb success

      - name: Seed preview data (E2E fixtures + password hashes)
        run: |
          node scripts/deployment-status-tracker.js track seed-e2e started
          node scripts/seed-e2e-data.js
          node scripts/deployment-status-tracker.js track seed-e2e success

      - name: Create Lambda packages
        run: |
          node scripts/deployment-status-tracker.js track lambda-packages started
          node scripts/create-lambda-packages.js
          node scripts/deployment-status-tracker.js track lambda-packages success

      - name: Deploy API (SAM)
        env:
          API_GATEWAY_REGIONAL_CERTIFICATE_ARN: ${{ secrets.API_GATEWAY_REGIONAL_CERTIFICATE_ARN }}
          E2E_AUTH_SECRET: ''
        run: |
          node scripts/deployment-status-tracker.js track api-gateway started
          node scripts/deploy-sam-api.js
          node scripts/deployment-status-tracker.js track api-gateway success

      - name: Build frontend
        run: npx nx build frontend --configuration=development

      - name: Deploy frontend (fast path)
        id: frontend
        continue-on-error: true
        run: node scripts/deploy-frontend-fast.js

      - name: Deploy frontend (full setup)
        if: steps.frontend.outcome == 'failure'
        run: |
          node scripts/deploy-frontend.js
          node scripts/setup-cloudfront.js

      - name: Setup frontend custom domain
        run: node scripts/setup-frontend-custom-domain.js

      - name: Sync runtime-config.json to S3 (API URL + preview login flag)
        run: |
          node <<'NODE'
          const fs = require('fs');
          const {
            syncRuntimeConfigToS3,
            resolveRuntimeApiUrl,
          } = require('./scripts/write-runtime-config.js');
          const stage = process.env.STAGE;
          const di = JSON.parse(fs.readFileSync('deployment-info.json', 'utf8'));
          const apiUrl = resolveRuntimeApiUrl(di);
          if (!apiUrl) {
            console.error('Could not resolve API URL from deployment-info.json');
            process.exit(1);
          }
          process.env.RUNTIME_FEATURE_PREVIEW_LOGIN = 'true';
          syncRuntimeConfigToS3(`equip-track-frontend-${stage}`, apiUrl);
          NODE

      - name: Invalidate CloudFront for runtime config
        run: |
          DIST_ID=$(jq -r '.frontend.cloudfront.distributionId // empty' deployment-info.json)
          if [[ -n "$DIST_ID" ]]; then
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/assets/runtime-config.json" "/*"
          fi

      # Fork PRs: token may be read-only; deployment still succeeds without a comment.
      - name: Comment preview URLs on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const stage = `pr-${{ github.event.pull_request.number }}`;
            const base = 'equip-track.com';
            const body = `### PR preview deployed\n\n- **App:** https://${stage}.${base}\n- **API:** https://${stage}-api.${base}\n\n**Sign-in:** Use **email + password** on the login page (not Google). Seeded emails are unchanged (e.g. \`e2e.admin@example.com\`); the **shared preview password** is the \`PR_PREVIEW_SEED_PASSWORD\` value from the **development** environment secret.\n`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '<!-- equiptrack-pr-preview-bot -->';
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            const fullBody = marker + '\n' + body;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Deployment report
        if: always()
        run: node scripts/deployment-status-tracker.js report
