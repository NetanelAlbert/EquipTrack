name: E2E LocalStack Core Regression

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - develop

concurrency:
  group: e2e-localstack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-core-regression:
    name: Core regression (LocalStack + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Prepare local E2E infrastructure
        run: npm run e2e:local:prepare

      - name: Run core regression E2E
        env:
          E2E_AUTH_SECRET: e2e-local-secret
          BACKEND_BASE_URL: http://localhost:3000
          E2E_SKIP_LOCAL_E2E_ENSURE: 'true'
        run: |
          npx nx run frontend-e2e:e2e-local-core

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-localstack-core
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-localstack-core
          path: test-results
          if-no-files-found: ignore

      - name: Summarize Playwright failure contexts
        if: always()
        run: |
          python3 <<'PY'
          import glob
          import os
          from pathlib import Path

          candidates = [
              "dist/.playwright/apps/frontend-e2e/test-output/**/error-context.md",
              "test-results/**/error-context.md",
          ]
          context_files = []
          for pattern in candidates:
              context_files.extend(glob.glob(pattern, recursive=True))
          context_files = sorted(set(context_files))

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_file:
              raise SystemExit(0)

          with open(summary_file, "a", encoding="utf-8") as handle:
              handle.write("## Playwright error contexts (localstack)\n\n")
              if not context_files:
                  handle.write("- No `error-context.md` files were found.\n")
              else:
                  handle.write(
                      f"- Found **{len(context_files)}** error-context file(s):\n"
                  )
                  for file_path in context_files:
                      relative = Path(file_path).as_posix()
                      handle.write(f"  - `{relative}`\n")
          PY

      - name: Tear down local stack
        if: always()
        run: npm run e2e:local:stack:down
