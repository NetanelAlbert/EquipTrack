name: Auto Version Bump

on:
  push:
    branches:
      - master
      - develop
      - 'release/*'
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'apps/frontend/src/environments/environment.ts'
      - 'apps/frontend/src/environments/environment.prod.ts'

jobs:
  version-bump:
    name: Bump Version
    runs-on: ubuntu-latest

    if: ${{ (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')) && !contains(github.event.head_commit.message, '[skip version]') }}

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        id: bump-version
        run: |
          bash scripts/bump-version-ci.sh
          # Read from package.json so GITHUB_OUTPUT is not affected by npm's stdout (npm version prints the new semver).
          new_version=$(node -p "require('./package.json').version")
          echo "new=${new_version}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json apps/frontend/src/environments/environment.ts apps/frontend/src/environments/environment.prod.ts
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            msg="chore: bump alpha version to ${{ steps.bump-version.outputs.new }} [skip version]"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            msg="chore: bump beta version to ${{ steps.bump-version.outputs.new }} [skip version]"
          else
            msg="chore: bump version to ${{ steps.bump-version.outputs.new }} [skip version]"
          fi
          git commit -m "${msg}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump-version.outputs.new }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.bump-version.outputs.new }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ steps.bump-version.outputs.new }}"
          release_name: ${{ github.ref == 'refs/heads/develop' && format('Alpha v{0}', steps.bump-version.outputs.new) || startsWith(github.ref, 'refs/heads/release/') && format('Beta v{0}', steps.bump-version.outputs.new) || format('Release v{0}', steps.bump-version.outputs.new) }}
          body: |
            Auto-generated ${{ github.ref == 'refs/heads/develop' && 'alpha pre-release' || startsWith(github.ref, 'refs/heads/release/') && 'beta pre-release' || 'release' }} for version ${{ steps.bump-version.outputs.new }}

            Changes:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/') }}
