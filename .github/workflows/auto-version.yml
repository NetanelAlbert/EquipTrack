name: Auto Version Bump

on:
  push:
    branches:
      - master
      - develop
    paths-ignore:
      - 'package.json'
      - 'package-lock.json'
      - 'apps/frontend/src/environments/environment.ts'
      - 'apps/frontend/src/environments/environment.prod.ts'

jobs:
  # Only honor [skip version] on the commit subject (first line). Merge commits to master often
  # include a long body listing merged commits; many of those lines contain [skip version] from
  # prior auto-bumps on develop, which must not suppress the post-merge bump on master.
  skip-gate:
    name: Check skip token on subject only
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.eval.outputs.should_run }}
    steps:
      - id: eval
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          first_line=$(printf '%s\n' "$COMMIT_MSG" | head -n1)
          if printf '%s' "$first_line" | grep -qiF '[skip version]'; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  version-bump:
    name: Bump Version
    needs: skip-gate
    if: needs.skip-gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Bump version
        id: bump-version
        run: |
          bash scripts/bump-version-ci.sh
          # Read from package.json so GITHUB_OUTPUT is not affected by npm's stdout (npm version prints the new semver).
          new_version=$(node -p "require('./package.json').version")
          echo "new=${new_version}" >> "${GITHUB_OUTPUT}"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json apps/frontend/src/environments/environment.ts apps/frontend/src/environments/environment.prod.ts
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            msg="chore: bump pre-release version to ${{ steps.bump-version.outputs.new }} [skip version]"
          else
            msg="chore: bump version to ${{ steps.bump-version.outputs.new }} [skip version]"
          fi
          git commit -m "${msg}"

      - name: Create and push tag
        run: |
          git tag "v${{ steps.bump-version.outputs.new }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.bump-version.outputs.new }}"

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "v${{ steps.bump-version.outputs.new }}"
          release_name: ${{ github.ref == 'refs/heads/develop' && format('Pre-release v{0}', steps.bump-version.outputs.new) || format('Release v{0}', steps.bump-version.outputs.new) }}
          body: |
            Auto-generated ${{ github.ref == 'refs/heads/develop' && 'pre-release' || 'release' }} for version ${{ steps.bump-version.outputs.new }}

            Changes:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/develop' }}
