name: E2E LocalStack Full Regression

on:
  workflow_dispatch:
  schedule:
    # Earlier than 03:00 UTC; minute 15 avoids the busiest :00 cron boundary (Actions may still delay runs).
    - cron: '15 0 * * *' # Nightly ~00:15 UTC

concurrency:
  group: e2e-localstack-full-${{ github.ref }}
  cancel-in-progress: true

# Nx Cloud org may be disabled; without this, `npx nx` exits before running tasks.
env:
  NX_NO_CLOUD: 'true'

jobs:
  decide:
    name: Check for changes on develop
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_tests: ${{ steps.decide.outputs.run_tests }}
    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Restore last successful run state
        uses: actions/cache/restore@v4
        with:
          path: .ci/e2e-localstack-full-state
          key: e2e-localstack-full-develop-state

      - name: Decide whether to run tests
        id: decide
        run: bash scripts/e2e-localstack-full-should-run.sh

  skip-notice:
    name: Skipped (no changes on develop)
    needs: decide
    if: needs.decide.outputs.run_tests != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip full regression
        run: |
          echo "Skipping Playwright full regression — develop and version unchanged since the last successful run."

  e2e-full-regression:
    name: Full regression (LocalStack + Playwright)
    needs: decide
    if: needs.decide.outputs.run_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Prepare local E2E infrastructure
        run: npm run e2e:local:prepare

      - name: Run full regression E2E
        env:
          E2E_AUTH_SECRET: e2e-local-secret
          BACKEND_BASE_URL: http://localhost:3000
          E2E_SKIP_LOCAL_E2E_ENSURE: 'true'
        run: |
          npx nx run frontend-e2e:e2e-local-full

      - name: Save last successful develop state
        if: success()
        run: bash scripts/e2e-localstack-full-save-state.sh

      - name: Cache last successful develop state
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .ci/e2e-localstack-full-state
          key: e2e-localstack-full-develop-state

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-localstack-full
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results-localstack-full
          path: test-results
          if-no-files-found: ignore

      - name: Summarize Playwright failure contexts
        if: always()
        run: python3 scripts/summarize-playwright-error-contexts.py --label localstack-full

      - name: Tear down local stack
        if: always()
        run: npm run e2e:local:stack:down
