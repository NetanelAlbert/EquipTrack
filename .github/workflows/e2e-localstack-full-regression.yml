name: E2E LocalStack Full Regression

on:
  workflow_dispatch:
    inputs:
      run_backend_e2e:
        description: 'Run backend-e2e contract tests before Playwright'
        required: false
        default: true
        type: boolean
  push:
    branches:
      - 'release/*'
  schedule:
    - cron: '0 3 * * *' # Nightly at 03:00 UTC

concurrency:
  group: e2e-localstack-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-full-regression:
    name: Full regression (LocalStack + Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint and unit tests
        run: npx nx run-many -t lint,test --all --nxBail

      - name: Run backend e2e contract tests
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_backend_e2e == 'true' }}
        run: npx nx run backend-e2e:e2e

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Prepare local E2E infrastructure
        run: npm run e2e:local:prepare

      - name: Run full regression E2E
        env:
          E2E_AUTH_SECRET: e2e-local-secret
          BACKEND_BASE_URL: http://localhost:3000
          E2E_SKIP_LOCAL_E2E_ENSURE: 'true'
        run: |
          npx nx run frontend-e2e:e2e-local-full

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-localstack-full
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-test-results-localstack-full
          path: test-results
          if-no-files-found: ignore

      - name: Summarize Playwright failure contexts
        if: always()
        run: python3 scripts/summarize-playwright-error-contexts.py --label localstack-full

      - name: Tear down local stack
        if: always()
        run: npm run e2e:local:stack:down
