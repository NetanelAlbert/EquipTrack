name: E2E Deployed Core Regression

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'GitHub Environment to use for secrets/protection'
        required: true
        default: development
        type: choice
        options:
          - development
          - production
      base_url:
        description: 'Frontend base URL (e.g. https://app.example.com)'
        required: true
        type: string
      backend_base_url:
        description: 'Backend API base URL (e.g. https://api.example.com)'
        required: true
        type: string

jobs:
  deployed-core-regression:
    uses: ./.github/workflows/e2e-deployed-core-reusable.yml
    with:
      base_url: ${{ github.event.inputs.base_url }}
      backend_base_url: ${{ github.event.inputs.backend_base_url }}
      target_environment: ${{ github.event.inputs.target_environment }}
      checkout_ref: ${{ github.sha }}
      artifact_suffix: deployed-core-manual
      summarize_label: deployed
    secrets: inherit
