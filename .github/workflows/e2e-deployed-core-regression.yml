name: E2E Deployed Core Regression

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'GitHub Environment to use for secrets/protection'
        required: true
        default: development
        type: choice
        options:
          - development
          - production
      base_url:
        description: 'Frontend base URL (e.g. https://app.example.com)'
        required: true
        type: string
      backend_base_url:
        description: 'Backend API base URL (e.g. https://api.example.com)'
        required: true
        type: string

jobs:
  deployed-core-regression:
    name: Core regression (deployed)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ github.event.inputs.target_environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium

      - name: Run deployed core regression
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          BACKEND_BASE_URL: ${{ github.event.inputs.backend_base_url }}
          E2E_AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET }}
          PLAYWRIGHT_HTML_OPEN: never
        run: npx nx run frontend-e2e:e2e-deployed-core

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deployed-core
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-deployed-core
          path: test-results
          if-no-files-found: ignore

      - name: Summarize Playwright failure contexts
        if: always()
        run: |
          python3 <<'PY'
          import glob
          import os
          from pathlib import Path

          candidates = [
              "dist/.playwright/apps/frontend-e2e/test-output/**/error-context.md",
              "test-results/**/error-context.md",
          ]
          context_files = []
          for pattern in candidates:
              context_files.extend(glob.glob(pattern, recursive=True))
          context_files = sorted(set(context_files))

          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          if not summary_file:
              raise SystemExit(0)

          with open(summary_file, "a", encoding="utf-8") as handle:
              handle.write("## Playwright error contexts (deployed)\n\n")
              if not context_files:
                  handle.write("- No `error-context.md` files were found.\n")
              else:
                  handle.write(
                      f"- Found **{len(context_files)}** error-context file(s):\n"
                  )
                  for file_path in context_files:
                      relative = Path(file_path).as_posix()
                      handle.write(f"  - `{relative}`\n")
          PY
