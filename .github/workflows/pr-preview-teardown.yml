name: PR preview teardown (webhook-driven)

# PR close / stack removal is handled by the same GitHub webhook on the preview host.
# See docs/pr-preview-webhook.md

on:
  workflow_dispatch:

jobs:
  documentation:
    name: Preview teardown is webhook-based
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Explain
        run: |
          echo "When a PR is closed, GitHub sends pull_request (action=closed) to your webhook."
          echo "See docs/pr-preview-webhook.md"
