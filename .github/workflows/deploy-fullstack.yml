name: Deploy Full Stack to AWS

on:
  push:
    branches:
      - develop
    tags:
      - 'v*'

concurrency:
  group: deploy-fullstack-${{ github.ref }}
  cancel-in-progress: true

env:
  # Use the correct lowercase AWS region identifier.
  AWS_REGION: il-central-1
  NODE_VERSION: '20'
  # Stage name is used by several deployment scripts (defaults to "dev" if omitted).
  STAGE: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'dev' }}

jobs:
  deploy:
    name: Deploy Full Stack
    runs-on: ubuntu-latest
    # Use GitHub Environments for proper separation and protection
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine deployment scope
        id: deployment-scope
        shell: bash
        run: |
          set -euo pipefail

          force_deployment=false
          commit_message="$(git log -1 --pretty=%B)"
          if [[ "$commit_message" == *"force full deployment"* ]] || [[ "$commit_message" == *"force-full-deployment"* ]] || [[ "$commit_message" == *"full deploy"* ]]; then
            force_deployment=true
            echo "🚀 Force full deployment detected in commit message."
          fi

          backend_changed=false
          frontend_changed=false
          api_changed=false

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "🏷️ Release tag detected, running full deployment."
            force_deployment=true
            backend_changed=true
            frontend_changed=true
            api_changed=true
          else
            base_sha="${{ github.event.before }}"
            if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                base_sha="$(git rev-parse HEAD~1)"
              else
                base_sha="$(git rev-parse HEAD)"
              fi
            fi

            changed_files="$(git diff --name-only "$base_sha" "$GITHUB_SHA" || true)"
            if [[ -z "$changed_files" ]] && git rev-parse HEAD~1 >/dev/null 2>&1; then
              changed_files="$(git diff --name-only HEAD~1 HEAD || true)"
            fi

            echo "🧾 Files changed since ${base_sha}:"
            if [[ -n "$changed_files" ]]; then
              echo "$changed_files"
            else
              echo "(none detected)"
            fi

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              case "$file" in
                apps/backend/*|scripts/create-dynamodb-tables.js|scripts/create-lambda-packages.js|scripts/deploy-lambdas.js|scripts/prepare-deployment.js|package.json|package-lock.json|nx.json|tsconfig*.json)
                  backend_changed=true
                  ;;
              esac

              case "$file" in
                apps/frontend/*|scripts/deploy-frontend.js|scripts/deploy-frontend-fast.js|scripts/setup-cloudfront.js|scripts/setup-frontend-custom-domain.js|package.json|package-lock.json|nx.json|tsconfig*.json)
                  frontend_changed=true
                  ;;
              esac

              case "$file" in
                libs/shared/src/api/*|scripts/prepare-deployment.js|scripts/deploy-api-gateway.js|scripts/setup-api-custom-domain.js)
                  api_changed=true
                  ;;
              esac

              case "$file" in
                libs/shared/*)
                  if [[ "$file" != libs/shared/src/api/* ]]; then
                    backend_changed=true
                    frontend_changed=true
                  fi
                  ;;
              esac
            done <<< "$changed_files"
          fi

          if [[ "$force_deployment" == "true" ]]; then
            backend_changed=true
            frontend_changed=true
            api_changed=true
          fi

          deployment_needed=false
          if [[ "$backend_changed" == "true" || "$frontend_changed" == "true" || "$api_changed" == "true" ]]; then
            deployment_needed=true
          fi

          {
            echo "force_deployment=$force_deployment"
            echo "backend_changed=$backend_changed"
            echo "frontend_changed=$frontend_changed"
            echo "api_changed=$api_changed"
            echo "deployment_needed=$deployment_needed"
          } >> "$GITHUB_OUTPUT"

          echo "📌 Deployment scope:"
          echo "  force_deployment=$force_deployment"
          echo "  backend_changed=$backend_changed"
          echo "  frontend_changed=$frontend_changed"
          echo "  api_changed=$api_changed"
          echo "  deployment_needed=$deployment_needed"

      - name: Skip deployment when no relevant changes are detected
        if: steps.deployment-scope.outputs.deployment_needed != 'true'
        run: echo "⏭️ No backend/frontend changes detected. Skipping deployment."

      - name: Setup Node.js
        if: steps.deployment-scope.outputs.deployment_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        if: steps.deployment-scope.outputs.deployment_needed == 'true'
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build backend
        if: steps.deployment-scope.outputs.backend_changed == 'true'
        run: npx nx build backend --configuration=${{ env.STAGE == 'production' && 'production' || 'development' }}

      - name: Build frontend
        if: steps.deployment-scope.outputs.frontend_changed == 'true'
        run: npx nx build frontend --configuration=${{ env.STAGE == 'production' && 'production' || 'development' }}

      - name: Configure AWS credentials
        if: steps.deployment-scope.outputs.deployment_needed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use environment-specific AWS credentials for proper isolation
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
          # Optional: Enable OIDC for enhanced security (requires environment-specific roles)
          # role-to-assume: ${{ vars.AWS_DEPLOYMENT_ROLE_ARN }}
          # role-session-name: GitHubActions-${{ github.run_id }}

      - name: Prepare deployment configuration
        id: prepare-deployment
        if: steps.deployment-scope.outputs.deployment_needed == 'true'
        run: |
          node scripts/deployment-status-tracker.js track prepare started
          node scripts/prepare-deployment.js
          node scripts/deployment-status-tracker.js track prepare success

      - name: Create DynamoDB tables
        id: create-dynamodb
        if: steps.deployment-scope.outputs.backend_changed == 'true'
        run: |
          node scripts/deployment-status-tracker.js track dynamodb started
          node scripts/create-dynamodb-tables.js
          node scripts/deployment-status-tracker.js track dynamodb success

      - name: Create Lambda deployment packages
        id: create-lambda-packages
        if: steps.deployment-scope.outputs.backend_changed == 'true'
        run: |
          node scripts/deployment-status-tracker.js track lambda-packages started
          node scripts/create-lambda-packages.js
          node scripts/deployment-status-tracker.js track lambda-packages success

      - name: Deploy Lambda functions
        id: deploy-lambdas
        if: steps.deployment-scope.outputs.backend_changed == 'true'
        run: |
          node scripts/deployment-status-tracker.js track lambda-deploy started
          node scripts/deploy-lambdas.js --parallel
          node scripts/deployment-status-tracker.js track lambda-deploy success

      - name: Deploy API Gateway
        id: deploy-api-gateway
        if: steps.deployment-scope.outputs.api_changed == 'true'
        run: |
          echo "🚀 Deploying API Gateway for stage: ${{ env.STAGE }}"
          node scripts/deployment-status-tracker.js track api-gateway started
          
          # First attempt: Normal deployment
          if node scripts/deploy-api-gateway.js; then
            echo "✅ API Gateway deployed successfully"
            node scripts/deployment-status-tracker.js track api-gateway success
            exit 0
          fi
          
          # If first attempt fails, check if it's a resource conflict
          echo "⚠️ First API Gateway deployment failed, analyzing error..."
          
          # Wait a moment for AWS to stabilize
          sleep 10
          
          # Second attempt: Use RECREATE_API to clean up conflicts
          echo "🔄 Retrying with RECREATE_API=true to resolve conflicts..."
          if RECREATE_API=true node scripts/deploy-api-gateway.js; then
            echo "✅ API Gateway deployed successfully after recreation"
            node scripts/deployment-status-tracker.js track api-gateway success
            exit 0
          fi
          
          # If both attempts fail, exit with error
          echo "❌ API Gateway deployment failed after two attempts"
          echo "🔧 Manual intervention may be required"
          node scripts/deployment-status-tracker.js track api-gateway failed "Both normal and recreation attempts failed"
          exit 1

      - name: Deploy Frontend to S3 (Fast - first attempt)
        id: deploy-frontend-fast
        if: steps.deployment-scope.outputs.frontend_changed == 'true' && steps.deployment-scope.outputs.force_deployment != 'true'
        run: |
          node scripts/deployment-status-tracker.js track frontend-fast started
          if node scripts/deploy-frontend-fast.js; then
            node scripts/deployment-status-tracker.js track frontend-fast success
          else
            node scripts/deployment-status-tracker.js track frontend-fast failed "Fast deployment failed, will retry with full setup"
            exit 1
          fi
        continue-on-error: true

      - name: Deploy Frontend to S3 (Full setup on fast failure or force trigger)
        id: deploy-frontend-full
        if: steps.deployment-scope.outputs.frontend_changed == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.deployment-scope.outputs.force_deployment == 'true')
        run: |
          if [[ "${{ steps.deployment-scope.outputs.force_deployment }}" == 'true' ]]; then
            echo "🚀 Force full deployment triggered by commit message: '${{ github.event.head_commit.message }}'"
            echo "🔄 Running full infrastructure setup..."
          else
            echo "Fast frontend deployment failed. Deploying with full infrastructure setup..."
          fi
          node scripts/deployment-status-tracker.js track frontend-full started
          node scripts/deploy-frontend.js
          node scripts/deployment-status-tracker.js track frontend-full success

      - name: Create CloudFront Distribution (if needed)
        id: setup-cloudfront
        if: steps.deployment-scope.outputs.frontend_changed == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.deployment-scope.outputs.force_deployment == 'true')
        run: |
          if [[ "${{ steps.deployment-scope.outputs.force_deployment }}" == 'true' ]]; then
            echo "🚀 Force full deployment: Setting up CloudFront distribution..."
          else
            echo "Setting up CloudFront distribution after fast deployment failure..."
          fi
          node scripts/deployment-status-tracker.js track cloudfront started
          node scripts/setup-cloudfront.js
          node scripts/deployment-status-tracker.js track cloudfront success

      - name: Verify Frontend Deployment Success
        if: steps.deployment-scope.outputs.frontend_changed == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.deployment-scope.outputs.force_deployment == 'true') && steps.deploy-frontend-full.outcome == 'failure'
        run: |
          echo "❌ Both fast and full frontend deployments failed!"
          echo "This is a critical failure that prevents the application from being accessible."
          exit 1

      - name: Setup Frontend Custom Domain
        id: setup-custom-domain
        if: steps.deployment-scope.outputs.frontend_changed == 'true' && steps.setup-cloudfront.outcome == 'success'
        run: |
          node scripts/deployment-status-tracker.js track custom-domain started
          if node scripts/setup-frontend-custom-domain.js; then
            node scripts/deployment-status-tracker.js track custom-domain success
            echo "✅ Custom domain setup completed successfully"
          else
            node scripts/deployment-status-tracker.js track custom-domain failed "Non-critical failure"
            echo "⚠️ Custom domain setup failed - this is non-critical"
            echo "ℹ️ Your application is still accessible via CloudFront URL"
            echo "🔧 Manual custom domain setup may be required"
          fi

      - name: Invalidate CloudFront cache
        if: success() && steps.deployment-scope.outputs.frontend_changed == 'true'
        run: |
          DIST_ID=$(jq -r '.frontend.cloudfront.distributionId // empty' deployment-info.json)
          if [[ -n "$DIST_ID" ]]; then
            echo "🔄 Invalidating CloudFront distribution: $DIST_ID"
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" "/assets/i18n/*"
            echo "✅ CloudFront invalidation created"
          else
            echo "⏭️ No CloudFront distribution ID in deployment-info.json, skipping invalidation"
          fi

      - name: Generate Deployment Report
        if: always() && steps.deployment-scope.outputs.deployment_needed == 'true'
        run: |
          echo "📊 Generating final deployment report..."
          node scripts/deployment-status-tracker.js report

      - name: Output URLs
        if: success() && steps.deployment-scope.outputs.deployment_needed == 'true'
        run: |
          echo "🌐 Deployment URLs:"
          echo "API deployed to: $(jq -r '.api.apiUrl // "unchanged-or-skipped"' deployment-info.json)"
          echo "Frontend deployed to: $(jq -r '.frontend.cloudfrontUrl // .frontend.cloudfront.cloudfrontUrl // "unchanged-or-skipped"' deployment-info.json)"
          echo "Custom domain: https://$(jq -r 'if .customDomains then ((.customDomains | keys | map(select(test("api") | not)))[0] // "not-configured") else "not-configured" end' deployment-info.json)"

      - name: Deployment Failed Summary
        if: failure() && steps.deployment-scope.outputs.deployment_needed == 'true'
        run: |
          echo "💥 Deployment Failed!"
          echo "Check the deployment report above for detailed failure information."
          echo "Common issues and solutions:"
          echo "  - AWS permissions: Verify IAM policies and credentials"
          echo "  - Resource conflicts: Check for existing resources with same names"
          echo "  - Region consistency: Ensure all services use il-central-1"
          exit 1 