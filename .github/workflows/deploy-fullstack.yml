name: Deploy Full Stack to AWS

on:
  push:
    tags:
      - 'v*'

# One deploy at a time per AWS stage (not per tag ref). Prerelease tags share the same target as dev;
# using github.ref per tag allowed v1.0.0-beta.1 and v1.0.0-beta.2 to run in parallel and race S3/CloudFront.
concurrency:
  group: deploy-fullstack-${{ contains(github.ref, '-') && 'dev' || 'production' }}
  cancel-in-progress: false

env:
  # Use the correct lowercase AWS region identifier.
  AWS_REGION: il-central-1
  NODE_VERSION: '20'
  # Skip Nx Cloud when the linked org is unavailable (CI would otherwise exit immediately).
  NX_NO_CLOUD: 'true'
  # Pre-release tags (semver prerelease, e.g. v1.2.3-beta.0) deploy to dev; stable release tags deploy to production.
  STAGE: ${{ contains(github.ref, '-') && 'dev' || 'production' }}
  # Optional: set repository secret NX_CLOUD_ACCESS_TOKEN after `nx connect` for remote cache.
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
  # Tag pushes report refs/tags/* as the branch in CI metadata; Nx Cloud uses that for cache partitioning,
  # so deploy jobs would not reuse remote cache from the default-branch pipeline. Pin to the repo default
  # branch so nx build (frontend/backend) shares the same Nx Cloud cache as develop/main CI and local runs.
  NX_BRANCH: ${{ github.event.repository.default_branch || 'develop' }}

jobs:
  deploy:
    name: Deploy Full Stack
    runs-on: ubuntu-latest
    # Use GitHub Environments for proper separation and protection
    environment: ${{ contains(github.ref, '-') && 'development' || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4
        id: set-shas
        with:
          main-branch-name: develop

      # nx-set-shas is optimized for pull_request; on direct pushes to develop it often leaves base empty
      # or base==head, which made "Determine deployment scope" always fall back to a full stack deploy.
      - name: Resolve nx comparison range (push-safe)
        id: nx-range
        env:
          NS_BASE: ${{ steps.set-shas.outputs.base }}
          NS_HEAD: ${{ steps.set-shas.outputs.head }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          HEAD="${NS_HEAD:-$GITHUB_SHA}"
          BASE="${NS_BASE}"
          if [ -z "$BASE" ] || [ "$BASE" = "$HEAD" ]; then
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              BASE="$BEFORE_SHA"
              echo "📌 nx-range: using github.event.before as base (push to develop)"
            else
              BASE=$(git rev-parse HEAD~1 2>/dev/null || true)
              if [ -n "$BASE" ]; then
                echo "📌 nx-range: using HEAD~1 as base"
              fi
            fi
          fi
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "head=${HEAD}" >> "$GITHUB_OUTPUT"
          echo "📌 nx-range resolved: ${BASE:-<empty>} .. ${HEAD}"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine deployment scope
        id: scope
        env:
          NX_BASE: ${{ steps.nx-range.outputs.base }}
          NX_HEAD: ${{ steps.nx-range.outputs.head }}
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
          HEAD_MSG: ${{ github.event.head_commit && github.event.head_commit.message || '' }}
        run: |
          set -euo pipefail
          write() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }

          if [ -z "${NX_BASE}" ] || [ -z "${NX_HEAD}" ]; then
            echo "⚠️ NX_BASE or NX_HEAD empty — defaulting to full stack deploy"
            write deploy_backend true
            write deploy_frontend true
            write deploy_api_gateway true
            exit 0
          fi

          FORCE_FULL=false
          if echo "${HEAD_MSG}" | grep -qiE 'force full deployment|force-full-deployment|full deploy'; then
            FORCE_FULL=true
          fi

          SCRIPTS_CHANGED="$(git diff --name-only "${NX_BASE}" "${NX_HEAD}" -- scripts .github/workflows/deploy-fullstack.yml 2>/dev/null || true)"
          API_SURFACE_CHANGED="$(git diff --name-only "${NX_BASE}" "${NX_HEAD}" -- \
            libs/shared/src/api \
            infra/sam \
            scripts/deploy-sam-api.js \
            scripts/generate-sam-template.js \
            scripts/prepare-deployment.js \
            scripts/setup-api-custom-domain.js \
            2>/dev/null || true)"

          if [ "${FORCE_FULL}" = "true" ] || [ "${IS_RELEASE}" = "true" ] || [ -n "${SCRIPTS_CHANGED}" ]; then
            write deploy_backend true
            write deploy_frontend true
            write deploy_api_gateway true
            echo "📋 Full stack deploy: release, force phrase, or deploy scripts/workflow changed"
            exit 0
          fi

          AFFECTED="$(npx nx show projects --affected --base="${NX_BASE}" --head="${NX_HEAD}" 2>/dev/null || true)"
          if [ -z "${AFFECTED}" ]; then
            echo "⚠️ No affected projects resolved — defaulting to full stack (safest)"
            write deploy_backend true
            write deploy_frontend true
            write deploy_api_gateway true
            exit 0
          fi

          DEPLOY_BACKEND=false
          DEPLOY_FRONTEND=false
          if echo "${AFFECTED}" | grep -qx backend; then DEPLOY_BACKEND=true; fi
          if echo "${AFFECTED}" | grep -qx frontend; then DEPLOY_FRONTEND=true; fi
          if echo "${AFFECTED}" | grep -qx shared; then DEPLOY_BACKEND=true; DEPLOY_FRONTEND=true; fi

          if [ "${DEPLOY_BACKEND}" = false ] && [ "${DEPLOY_FRONTEND}" = false ]; then
            echo "⚠️ Affected projects did not include backend, frontend, or shared — defaulting to full stack"
            write deploy_backend true
            write deploy_frontend true
            write deploy_api_gateway true
            exit 0
          fi

          write deploy_backend "${DEPLOY_BACKEND}"
          write deploy_frontend "${DEPLOY_FRONTEND}"

          if [ -n "${API_SURFACE_CHANGED}" ]; then
            write deploy_api_gateway true
            echo "📋 API Gateway sync required (shared API surface or gateway/prepare scripts changed)"
          elif [ "${DEPLOY_BACKEND}" = true ]; then
            write deploy_api_gateway false
            echo "📋 Backend deploy without API surface changes — skip REST API rebuild (Lambda updates only)"
          else
            write deploy_api_gateway false
            echo "📋 Frontend-only deploy — skip backend AWS steps"
          fi

      - name: Deployment scope summary
        run: |
          {
            echo "## Deploy scope (this run)"
            echo ""
            echo "| Setting | Value |"
            echo "|--------|-------|"
            echo "| **deploy_backend** | \`${{ steps.scope.outputs.deploy_backend }}\` |"
            echo "| **deploy_frontend** | \`${{ steps.scope.outputs.deploy_frontend }}\` |"
            echo "| **deploy_api_gateway** | \`${{ steps.scope.outputs.deploy_api_gateway }}\` |"
            echo "| **nx base** | \`${{ steps.nx-range.outputs.base }}\` |"
            echo "| **nx head** | \`${{ steps.nx-range.outputs.head }}\` |"
            echo ""
            echo "### When does the workflow get faster?"
            echo "- **Skip SAM stack deploy** when \`deploy_api_gateway\` is \`false\` **and** the API already exists in AWS: backend still builds and updates data, but **Lambdas are not redeployed** in that run (run a full deploy or touch API/Lambda-related paths to pick up backend changes)."
            echo "- **Skip one app build** when only frontend or only backend is affected (not both)."
            echo "- **Shared library:** almost any change under \`libs/shared\` marks **both** apps affected (both import it), so many real commits still build and deploy both."
            echo "- **Nx Cloud:** set \`NX_CLOUD_ACCESS_TOKEN\` (repo secret) for remote cache; this workflow sets \`NX_BRANCH\` to the default branch on tag deploys so cache matches merge CI."
            echo "- **Lambda packaging** builds one shared zip (\`shared-lambda-bundle.zip\`); **SAM** deploys all Lambdas + API Gateway from \`infra/sam/template.yaml\` (content-addressed S3 key per build)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build backend
        if: steps.scope.outputs.deploy_backend == 'true'
        run: npx nx build backend --configuration=${{ env.STAGE == 'production' && 'production' || 'development' }}

      - name: Build frontend
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: npx nx build frontend --configuration=${{ env.STAGE == 'production' && 'production' || 'development' }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        if: steps.scope.outputs.deploy_backend == 'true'
        uses: aws-actions/setup-sam@v2

      - name: Prepare deployment configuration
        id: prepare-deployment
        run: |
          node scripts/deployment-status-tracker.js track prepare started
          node scripts/prepare-deployment.js
          node scripts/deployment-status-tracker.js track prepare success

      - name: Hydrate backend API from AWS
        id: hydrate-backend
        run: node scripts/hydrate-backend-infra.js

      - name: Create DynamoDB tables
        id: create-dynamodb
        if: steps.scope.outputs.deploy_backend == 'true'
        run: |
          node scripts/deployment-status-tracker.js track dynamodb started
          node scripts/create-dynamodb-tables.js
          node scripts/deployment-status-tracker.js track dynamodb success

      # Deployed Playwright core regression expects org-e2e-main / prod-bulk-helmet / etc. in dev DynamoDB.
      - name: Seed E2E fixture data (dev only)
        if: ${{ steps.scope.outputs.deploy_backend == 'true' && env.STAGE == 'dev' }}
        run: |
          node scripts/deployment-status-tracker.js track seed-e2e started
          node scripts/seed-e2e-data.js
          node scripts/deployment-status-tracker.js track seed-e2e success

      - name: Create Lambda deployment packages
        id: create-lambda-packages
        if: steps.scope.outputs.deploy_backend == 'true'
        run: |
          node scripts/deployment-status-tracker.js track lambda-packages started
          node scripts/create-lambda-packages.js
          node scripts/deployment-status-tracker.js track lambda-packages success

      - name: Deploy API and Lambdas (AWS SAM)
        id: deploy-api-gateway
        if: ${{ steps.scope.outputs.deploy_backend == 'true' && (steps.scope.outputs.deploy_api_gateway == 'true' || steps.hydrate-backend.outputs.api_exists != 'true') }}
        env:
          API_GATEWAY_REGIONAL_CERTIFICATE_ARN: ${{ secrets.API_GATEWAY_REGIONAL_CERTIFICATE_ARN }}
          E2E_AUTH_ENABLED: ${{ env.STAGE == 'dev' && 'true' || 'false' }}
          E2E_AUTH_SECRET: ${{ secrets.E2E_AUTH_SECRET }}
          PRUNE_LEGACY_API_GATEWAY: ${{ vars.PRUNE_LEGACY_API_GATEWAY }}
        run: |
          echo "🚀 Deploying SAM stack (API Gateway + Lambdas) for stage: ${{ env.STAGE }}"
          node scripts/deployment-status-tracker.js track api-gateway started
          set +e
          node scripts/deploy-sam-api.js
          sam_exit=$?
          set -e
          if [ "$sam_exit" -eq 0 ]; then
            node scripts/deployment-status-tracker.js track api-gateway success
          else
            node scripts/deployment-status-tracker.js track api-gateway failed "SAM deploy failed (exit ${sam_exit})"
            exit "$sam_exit"
          fi

      - name: Check if force full deployment is requested
        id: check-force-deployment
        run: |
          if [[ "${{ github.event.head_commit && github.event.head_commit.message || '' }}" == *"force full deployment"* ]] || [[ "${{ github.event.head_commit && github.event.head_commit.message || '' }}" == *"force-full-deployment"* ]] || [[ "${{ github.event.head_commit && github.event.head_commit.message || '' }}" == *"full deploy"* ]]; then
            echo "force_deployment=true" >> $GITHUB_OUTPUT
            echo "🚀 Force full deployment detected in commit message"
          else
            echo "force_deployment=false" >> $GITHUB_OUTPUT
            echo "✅ No force deployment requested, will attempt fast deployment first"
          fi

      - name: Deploy Frontend to S3 (Fast - first attempt)
        id: deploy-frontend-fast
        if: steps.scope.outputs.deploy_frontend == 'true' && steps.check-force-deployment.outputs.force_deployment != 'true'
        run: |
          node scripts/deployment-status-tracker.js track frontend-fast started
          if node scripts/deploy-frontend-fast.js; then
            node scripts/deployment-status-tracker.js track frontend-fast success
          else
            node scripts/deployment-status-tracker.js track frontend-fast failed "Fast deployment failed, will retry with full setup"
            exit 1
          fi
        continue-on-error: true

      - name: Deploy Frontend to S3 (Full setup on fast failure or force trigger)
        id: deploy-frontend-full
        if: ${{ steps.scope.outputs.deploy_frontend == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.check-force-deployment.outputs.force_deployment == 'true') }}
        run: |
          if [ "${{ steps.check-force-deployment.outputs.force_deployment }}" = "true" ]; then
            echo "🚀 Force full deployment — running full frontend infrastructure setup..."
          else
            echo "Fast frontend deployment failed. Deploying with full infrastructure setup..."
          fi
          node scripts/deployment-status-tracker.js track frontend-full started
          node scripts/deploy-frontend.js
          node scripts/deployment-status-tracker.js track frontend-full success

      - name: Create CloudFront Distribution (if needed)
        id: setup-cloudfront
        if: ${{ steps.scope.outputs.deploy_frontend == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.check-force-deployment.outputs.force_deployment == 'true') }}
        run: |
          if [ "${{ steps.check-force-deployment.outputs.force_deployment }}" = "true" ]; then
            echo "🚀 Force full deployment: Setting up CloudFront distribution..."
          else
            echo "Setting up CloudFront distribution after fast deployment failure..."
          fi
          node scripts/deployment-status-tracker.js track cloudfront started
          node scripts/setup-cloudfront.js
          node scripts/deployment-status-tracker.js track cloudfront success

      - name: Verify Frontend Deployment Success
        if: ${{ steps.scope.outputs.deploy_frontend == 'true' && (steps.deploy-frontend-fast.outcome == 'failure' || steps.check-force-deployment.outputs.force_deployment == 'true') && steps.deploy-frontend-full.outcome == 'failure' }}
        run: |
          echo "❌ Both fast and full frontend deployments failed!"
          exit 1

      - name: Setup Frontend Custom Domain
        id: setup-custom-domain
        if: steps.scope.outputs.deploy_frontend == 'true'
        run: |
          node scripts/deployment-status-tracker.js track custom-domain started
          if node scripts/setup-frontend-custom-domain.js; then
            node scripts/deployment-status-tracker.js track custom-domain success
            echo "✅ Custom domain setup completed successfully"
          else
            node scripts/deployment-status-tracker.js track custom-domain failed "Non-critical failure"
            echo "⚠️ Custom domain setup failed - non-critical"
          fi

      - name: Invalidate CloudFront cache
        if: success() && steps.scope.outputs.deploy_frontend == 'true'
        run: |
          DIST_ID=$(jq -r '.frontend.cloudfront.distributionId // empty' deployment-info.json)
          if [[ -n "$DIST_ID" ]]; then
            echo "🔄 Invalidating CloudFront distribution: $DIST_ID"
            aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/*" "/assets/i18n/*"
            echo "✅ CloudFront invalidation created"
          else
            echo "⏭️ No CloudFront distribution ID in deployment-info.json, skipping invalidation"
          fi

      - name: Generate Deployment Report
        if: always()
        run: |
          echo "📊 Generating final deployment report..."
          node scripts/deployment-status-tracker.js report

      - name: Output URLs
        if: success()
        run: |
          echo "🌐 Deployment URLs:"
          echo "API deployed to: $(cat deployment-info.json | jq -r '.api.apiUrl // empty')"
          echo "Frontend deployed to: $(cat deployment-info.json | jq -r '.frontend.cloudfrontUrl // empty')"
          echo "Custom domain: https://$(cat deployment-info.json | jq -r 'if .customDomains then (.customDomains | keys | map(select(test("api") | not)))[0] else "not-configured" end')"

      - name: Deployment Failed Summary
        if: failure()
        run: |
          echo "💥 Deployment Failed!"
          echo "Check the deployment report above for detailed failure information."
          exit 1
