name: PR preview deploy (webhook-driven)

# Automated deploys run on the preview host via GitHub webhook — not from this workflow.
# See docs/pr-preview-webhook.md

on:
  workflow_dispatch:

jobs:
  documentation:
    name: Preview deploy is webhook-based
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Explain
        run: |
          echo "PR previews are deployed when GitHub sends pull_request events to:"
          echo "  https://<your-host>/webhooks/github/preview"
          echo "Configure the webhook and the host listener per docs/pr-preview-webhook.md"
