# Edge reverse proxy: single hostname, path /{pr}/ → loopback preview-web (see docs/pr-preview-environments.md).
# TLS: terminate at ALB/NLB in front of :80, or add a :443 server block with certs on this host.

server {
    listen 80;
    server_name _;

    location = /_preview-edge-health {
        default_type text/plain;
        return 200 'ok';
    }

    include /etc/nginx/preview-snippets/*.conf;

    location / {
        return 404;
    }
}
