# Edge reverse proxy: single hostname, path /{pr}/ → loopback preview-web (see docs/pr-preview-environments.md).
# TLS: terminate at ALB/NLB in front of :80, or add a :443 server block with certs on this host.

server {
    listen 80;
    server_name _;

    location = /_preview-edge-health {
        default_type text/plain;
        return 200 'ok';
    }

    # GitHub → POST only; proxy must pass raw body for HMAC (no buffering transforms).
    location = /webhooks/github/preview {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2m;
    }

    location = /webhooks/github/healthz {
        proxy_pass http://127.0.0.1:9090/healthz;
        proxy_http_version 1.1;
    }

    include /etc/nginx/preview-snippets/*.conf;

    location / {
        return 404;
    }
}
